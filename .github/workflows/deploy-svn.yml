name: Deploy to WordPress.org SVN

on:
  push:
    # Le workflow se déclenche uniquement lorsqu'un tag de version est poussé (ex: v1.0.3)
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupération du code source de GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install SVN tools
        run: sudo apt-get update && sudo apt-get install -y subversion rsync

      - name: Checkout WordPress.org SVN
        run: svn checkout --depth infinity "https://plugins.svn.wordpress.org/ethersys-importer-for-modelo-netty" svn

      - name: Sync latest plugin release
        run: |
          set -euo pipefail

          mkdir -p "svn/trunk" "svn/tags/${VERSION}"

          find svn/trunk -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          find "svn/tags/${VERSION}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

          # Ne jamais purger les anciens tags : WordPress.org s'appuie sur leur
          # présence sur SVN pour permettre le rollback d'une version publiée.

          sed -i -E "s/^Stable tag: .*/Stable tag: ${VERSION}/" "ethersys-importer-for-modelo-netty/readme.txt"

          rsync -a --delete "ethersys-importer-for-modelo-netty/" "svn/trunk/"
          rsync -a --delete "ethersys-importer-for-modelo-netty/" "svn/tags/${VERSION}/"

          cd svn
          svn add --force trunk "tags/${VERSION}" --depth infinity
          svn status | awk '/^!/ { print $2 }' | xargs -r svn rm --force

      - name: Commit to WordPress.org SVN
        working-directory: svn
        env:
          SVN_USERNAME: ${{ secrets.ETHERSYS_WORDPRESS_LOGIN }}
          SVN_PASSWORD: ${{ secrets.ETHERSYS_WORDPRESS_PASSWORD }}
        run: |
          set -euo pipefail

          svn status

          if [ -z "$(svn status)" ]; then
            echo "No SVN changes to commit."
            exit 0
          fi

          svn commit \
            --username "$SVN_USERNAME" \
            --password "$SVN_PASSWORD" \
            --non-interactive \
            --trust-server-cert \
            -m "Deploy version ${VERSION}"