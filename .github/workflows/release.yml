name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build zip
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: zip -r "ethersys-importer-for-modelo-netty-${VERSION}.zip" ethersys-importer-for-modelo-netty/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release create "${TAG}" \
            --title "v${VERSION}" \
            --generate-notes \
            "ethersys-importer-for-modelo-netty-${VERSION}.zip"
