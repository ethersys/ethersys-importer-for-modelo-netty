name: Tests

# Matrice de compatibilité:
# WordPress: 6.8.5, 6.9.4, 7.0
# PHP: 8.3, 8.4, 8.5

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run tests
        run: composer test

  integration-tests:
    name: Integration Tests (WP ${{ matrix.wp-version }}, PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        wp-version: ['6.8.5', '6.9.4', '7.0']
        php-version: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php-version }}-

      - name: Install npm dependencies
        run: npm install -g wp-env

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Setup test environment
        run: |
          cat > wp-env-test/.wp-env.json << EOF
          {
            "core": "${{ matrix.wp-version }}",
            "phpVersion": "${{ matrix.php-version }}",
            "plugins": [
              "../modelo-nettytowpimport",
              "./houzez-stub"
            ],
            "themes": [],
            "mappings": {
              "wp-content/mnti-tests": "./phpunit"
            },
            "config": {
              "WPLANG": "fr_FR"
            },
            "testsEnvironment": false
          }
          EOF

      - name: Start wp-env
        run: cd wp-env-test && wp-env start --update

      - name: Run integration tests
        run: cd wp-env-test && wp-env run tests bash -c "cd /var/www/html && composer test"

      - name: Cleanup
        if: always()
        run: cd wp-env-test && wp-env stop
